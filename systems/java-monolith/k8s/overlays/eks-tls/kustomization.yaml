# ============================================================
# Overlay — EKS TLS (production, HTTPS via ACM)
# Purpose: AWS EKS production deployment with HTTPS.
#
# What this overlay does differently from base:
#   1. Adds Gateway with HTTPS listener + ACM cert annotation.
#   2. Patches mysql-pvc StorageClass to gp3.
#   3. Scales app to 3 replicas for production.
#
# Deploy:  kubectl apply -k overlays/eks-tls/
# Get ALB DNS: kubectl get gateway java-monolith-gateway -n java-monolith
# Then create a CNAME in Route53: bankapp.ibtisam-iq.com → ALB DNS
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

resources:
  - gateway.yaml

patches:
  # Patch mysql-pvc to gp3 StorageClass
  - patch: |-
      - op: add
        path: /spec/storageClassName
        value: gp3
    target:
      kind: PersistentVolumeClaim
      name: mysql-pvc
  # Scale up for production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: java-monolith-deployment

images:
  - name: ibtisam-iq/java-monolith-bankapp
    newTag: "0.0.2-SNAPSHOT-2c2676d-26"

commonLabels:
  environment: eks-tls

# ============================================================
# Gateway — EKS TLS overlay (HTTPS, production)
# Controller: AWS Load Balancer Controller (Gateway API mode)
#
# TLS is terminated at the ALB using an AWS ACM certificate.
# ACM cert ARN is referenced via annotation — no cert-manager needed.
#
# Prerequisites:
#   1. ACM certificate issued for your domain in the same AWS region.
#   2. DNS CNAME: bankapp.ibtisam-iq.com → ALB DNS name (after first apply).
#   3. AWS Load Balancer Controller installed with Gateway API feature enabled.
#
# IMPORTANT: replace the certificate ARN annotation with your real ACM cert ARN.
# ============================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: java-monolith-gateway
  namespace: java-monolith
  labels:
    app.kubernetes.io/name: java-monolith
    app.kubernetes.io/component: gateway
    environment: eks-tls
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    # Replace with your ACM certificate ARN:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:123456789012:certificate/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    # Redirect HTTP to HTTPS at the ALB level
    service.beta.kubernetes.io/aws-load-balancer-ssl-negotiation-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
spec:
  gatewayClassName: alb
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: bankapp.ibtisam-iq.com      # ← replace with your actual domain
      tls:
        mode: Terminate
        certificateRefs:
          - name: aws-acm-cert              # Symbolic ref; actual cert is via ACM annotation above
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: Same

# ============================================================
# Overlay — Local (minikube / kind)
# Purpose: zero-cost testing on local Kubernetes cluster.
#
# What this overlay does differently from base:
#   1. Patches app-service type to NodePort for direct access
#      without needing a real load balancer.
#   2. Sets image tag from image.env (CI-managed).
#   3. Adds local gateway.yaml.
#
# Deploy:  kubectl apply -k overlays/local/
# Access:  minikube service java-monolith-service -n java-monolith
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

resources:
  - gateway.yaml

# Patch app-service type to NodePort — allows direct access
# without a LoadBalancer (no cost, works on minikube/kind).
patchesStrategicMerge: []
patches:
  - patch: |-
      - op: replace
        path: /spec/type
        value: NodePort
    target:
      kind: Service
      name: java-monolith-service

# Image tag — update this from image.env in your CD step:
#   kustomize edit set image ibtisam-iq/java-monolith-bankapp=ibtisam-iq/java-monolith-bankapp:$(IMAGE_TAG)
images:
  - name: ibtisam-iq/java-monolith-bankapp
    newTag: "0.0.2-SNAPSHOT-2c2676d-26"

commonLabels:
  environment: local

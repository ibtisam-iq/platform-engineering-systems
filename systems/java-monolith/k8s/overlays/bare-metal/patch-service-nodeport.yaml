# k8s/overlays/bare-metal/patch-service-nodeport.yaml
# Kustomize patch: converts bankapp-service from ClusterIP to NodePort.

# PORT MAPPING:
# External request (browser/curl) -> Node IP:30080
#   -> Service ClusterIP:80
#   -> Pod targetPort:8000 (Spring Boot container)

# ACCESS:
# Internal cluster: curl - I http://<node-ip>:30080/
# Browser: http://<node-ip>:30080/

# CLOUDFLARE TUNNEL INTEGRATION:
# Configure tunnel service target as http://<node-ip>:30080

apiVersion: v1
kind: Service
metadata:
  name: bankapp-service
  namespace: bankapp
spec:
  type: NodePort
  ports:
    # - name: http        # optional, but good to have for clarity
    #  targetPort: http   # optional, but good to have for clarity
    - port: 80            # mandatory, matches base exactly — no change
      nodePort: 30080     # only NEW thing being added
      protocol: TCP       # mandatory, otherwise nodePort randomly assigned, not 30080

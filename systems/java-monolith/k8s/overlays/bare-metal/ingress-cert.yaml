# k8s/overlays/bare-metal/ingress-cert.yaml
# HTTPS Ingress with automated TLS certificate via Let's Encrypt.
# Deployed: 2026-04-26
# Environment: bare-metal server with public IP and real DNS

# ARCHITECTURE:
# - cert-manager automates TLS certificate lifecycle (issuance, renewal)
# - Let's Encrypt provides free DV certificates (90-day validity, auto-renewed)
# - HTTP-01 challenge validates domain ownership via temporary ingress
# - Certificate stored as Kubernetes Secret, consumed by ingress-nginx

# PREREQUISITES (one-time cluster setup):
# 1. DNS: A record java-monolith.ibtisam-iq.com -> <public-ip>
#    Cloudflare proxy must be DISABLED (grey cloud) for HTTP-01 challenge
# 2. Firewall: ports 80, 443 open for ingress traffic
# 3. ingress-nginx controller installed (baremetal provider):
#    For more providers, check: https://kubernetes.github.io/ingress-nginx/deploy/
#    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/baremetal/deploy.yaml
# 4. cert-manager installed:
#    helm upgrade --install cert-manager jetstack/cert-manager --namespace cert-manager --set crds.enabled=true --set config.enableGatewayAPI=true

#    kubectl get pods -n cert-manager  # verify all pods Running

# DEPLOYMENT:
# kubectl apply -f ingress-cert.yaml     # order matters: applies ClusterIssuer first, then Ingress
# kubectl get certificate -n bankapp -w  # watch until READY=True (1-3 min)
# kubectl describe certificate java-monolith-tls -n bankapp
# kubectl get secret -n bankapp  # cert-manager auto-creates the secret when cert is issued

# CERTIFICATE LIFECYCLE:
# - cert-manager watches Ingress with cert-manager.io/cluster-issuer annotation
# - Creates Certificate resource and CertificateRequest
# - Initiates ACME HTTP-01 challenge with Let's Encrypt
# - Stores issued cert + private key in Secret (spec.tls.secretName)
# - Renews automatically 30 days before expiry

---
# ClusterIssuer: Let's Encrypt ACME client configuration
# Cluster-scoped resource (no namespace), reusable across all Ingresses
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Production ACME endpoint (rate-limited: 50 certs/domain/week)
    # For testing, use staging: https://acme-staging-v02.api.letsencrypt.org/directory
    server: https://acme-v02.api.letsencrypt.org/directory

    # Email for certificate expiry notifications (optional but recommended)
    email: contact@ibtisam-iq.com

    # Secret stores ACME account private key (auto-created by cert-manager)
    # This is NOT the TLS certificate — it's the Let's Encrypt account credential
    privateKeySecretRef:
      name: letsencrypt-prod-account-key

    # HTTP-01 challenge solver
    # cert-manager creates temporary Ingress to serve /.well-known/acme-challenge/<token>
    solvers:
      - http01:
          ingress:
            class: nginx  # must match ingressClassName in Ingress spec below

---
# Ingress: HTTPS routing with automated TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bankapp-ingress-cert
  namespace: bankapp
  labels:
    app.kubernetes.io/name: bankapp
    app.kubernetes.io/part-of: bankapp
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # Triggers cert-manager to issue certificate for this Ingress
    # References ClusterIssuer defined above
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Path rewriting (same as non-TLS variant)
    nginx.ingress.kubernetes.io/rewrite-target: /

    # Force HTTPS redirect (HTTP 301 permanent redirect)
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # Backend protocol (upstream service speaks HTTP)
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

    # Controller class (optional, kept for compatibility)
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
    - host: java-monolith.ibtisam-iq.com
      # Routes requests with Host: java-monolith.ibtisam-iq.com header
      # DNS A record value: node IP (bare-metal NodePort) — get via `hostname -I`
      # DNS A record value: external IP (MetalLB or cloud LoadBalancer) — get via `kubectl get svc -n ingress-nginx`

      # Testing without DNS (or when node IP is private/unreachable externally):

      #   HTTP:  curl -I -H "Host: java-monolith.ibtisam-iq.com" http://<node-ip>:<ingress-nodeport-80>/
      #          curl -I -H "Host: java-monolith.ibtisam-iq.com" http://172.16.0.2:32262/
      #   HTTPS: curl -I https://<node-ip>:443/ --resolve java-monolith.ibtisam-iq.com:443:<node-ip>/
      #          curl -I -H "Host: java-monolith.ibtisam-iq.com" https://<node-ip>:<ingress-nodeport-443>/ -k

      # Cloudflare Tunnel integration: configure tunnel service target as
      #   HTTP: http://<node-ip>:<ingress-nodeport-80>/ (e.g. http://172.16.0.2:32262) or
      #   HTTPS: https://<node-ip>:<ingress-nodeport-443>/ (e.g. https://172.16.0.2:31872)
      #   with Host header java-monolith.ibtisam-iq.com

      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bankapp-service
                port:
                  number: 80
  tls:
    - hosts:
        # Hostname for which cert-manager issued certificate (must match Ingress rule host)
        - java-monolith.ibtisam-iq.com
      # Secret name where cert-manager stores issued certificate
      # Created automatically — do NOT create this Secret manually
      secretName: java-monolith-tls

# VERIFICATION:
# kubectl get certificate -n bankapp
# kubectl get secret java-monolith-tls -n bankapp
# curl -I https://java-monolith.ibtisam-iq.com
# openssl s_client -connect java-monolith.ibtisam-iq.com:443 -servername java-monolith.ibtisam-iq.com

# TROUBLESHOOTING:
# kubectl describe certificate java-monolith-tls -n bankapp
# kubectl describe certificaterequest -n bankapp
# kubectl get challenges -n bankapp  # HTTP-01 challenge status
# kubectl logs -n cert-manager deploy/cert-manager

# NOTES:
# - Certificate valid for 90 days, auto-renewed at day 60
# - HTTP-01 requires port 80 accessible from internet
# - Cloudflare proxy breaks HTTP-01 (use DNS-01 solver or disable proxy)
# - For wildcard certs (*.ibtisam-iq.com), use DNS-01 challenge instead
# - Rate limits: 50 certs/registered domain/week (production), 5 failures/account/hour

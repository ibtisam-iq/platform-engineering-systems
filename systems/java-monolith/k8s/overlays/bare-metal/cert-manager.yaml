# ============================================================
# ClusterIssuer — Let's Encrypt production
# cert-manager uses this to auto-provision and renew TLS certs.
#
# IMPORTANT: replace email with your real email address.
# Let's Encrypt sends expiry warnings to this address.
# ============================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ibtisam@ibtisam-iq.com           # ← replace with your email
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: java-monolith-gateway
                namespace: java-monolith
                kind: Gateway

# ============================================================
# Gateway — Bare-metal overlay (your own kubeadm cluster)
# Controller: nginx-gateway-fabric (same as local)
#
# Differences from local:
#   - HTTPS listener with TLS termination
#   - Real domain: bankapp.ibtisam-iq.com
#   - TLS cert managed by cert-manager + Let's Encrypt
#
# Prerequisites:
#   1. cert-manager installed:
#        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   2. ClusterIssuer created (see cert-manager.yaml in this overlay)
#   3. DNS A record: bankapp.ibtisam-iq.com → your server IP
#   4. NGINX Gateway Fabric installed (same as local)
# ============================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: java-monolith-gateway
  namespace: java-monolith
  labels:
    app.kubernetes.io/name: java-monolith
    app.kubernetes.io/component: gateway
    environment: bare-metal
  annotations:
    # cert-manager auto-provisions a TLS cert for the domain below
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: bankapp.ibtisam-iq.com      # ← replace with your actual domain
      tls:
        mode: Terminate
        certificateRefs:
          - name: java-monolith-tls          # cert-manager creates this Secret
            kind: Secret
      allowedRoutes:
        namespaces:
          from: Same

# ============================================================
# Deployment — Spring Boot Bank Application
# Image: ibtisam-iq/java-monolith-bankapp
# Tag is managed by CI via image.env and patched per overlay.
# App port: 8000 (set in SERVER_PORT env var via ConfigMap)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-monolith-deployment
  namespace: java-monolith
  labels:
    app.kubernetes.io/name: java-monolith
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-monolith
  template:
    metadata:
      labels:
        app: java-monolith
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: java-monolith
          # Tag is overridden per overlay via kustomization.yaml images:
          image: ibtisam-iq/java-monolith-bankapp:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: java-monolith-config
            - secretRef:
                name: java-monolith-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

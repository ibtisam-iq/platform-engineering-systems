# ============================================================
# HTTPRoute — Gateway API (gateway.networking.k8s.io/v1)
# Routing rules are PLATFORM-AGNOSTIC — same for local, bare-metal, EKS.
# Only the Gateway object (defined per overlay) differs per platform.
#
# Gateway API replaces Ingress. It separates concerns:
#   GatewayClass  → which controller handles traffic (nginx, aws, etc.)
#   Gateway       → the actual entry point / load balancer (per overlay)
#   HTTPRoute     → routing rules / path matching (here, in base)
#
# parentRefs.name must match the Gateway name in each overlay.
# ============================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bankapp-route
  namespace: bankapp
  labels:
    app.kubernetes.io/name: bankapp
    app.kubernetes.io/component: routing
spec:
  parentRefs:
    - name: bankapp-gateway         # must match Gateway.metadata.name in each overlay
      namespace: bankapp
  hostnames:
  - java-monolith.ibtisam-iq.com    # see overlays/bare-metal/ingress-cert.yaml for DNS setup
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: bankapp-service     
          port: 80
          weight: 100

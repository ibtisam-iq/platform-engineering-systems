# =============================================================================
# secret.yaml — Sensitive Credentials Template (DO NOT COMMIT REAL VALUES)
# =============================================================================
#
# ██████  WARNING ██████
# This file is a TEMPLATE. The values below are base64-encoded PLACEHOLDERS.
# Real credentials MUST be injected via one of the methods described below.
# Committing real credentials to Git — even in a private repo — is a
# CIS Kubernetes Benchmark violation and will be flagged by any secret scanner
# (Trivy, GitGuardian, Gitleaks, GitHub Secret Scanning).
# ██████  WARNING ██████
#
# HOW KUBERNETES SECRETS WORK:
# ─────────────────────────────
# Kubernetes Secret.data values MUST be base64-encoded (not encrypted).
# Base64 is encoding, NOT encryption. Anyone with `kubectl get secret` access
# can decode them instantly: echo "dmFsdWU=" | base64 --decode
#
# To generate a base64 value for a real credential:
#   echo -n "your-actual-password" | base64
#   # -n flag: do NOT append a trailing newline (newline changes the hash)
#
# To verify a base64 value decodes to what you expect:
#   echo "eW91ci1hY3R1YWwtcGFzc3dvcmQ=" | base64 --decode
#
# PRODUCTION CREDENTIAL MANAGEMENT — choose one:
# ────────────────────────────────────────────────
# Option 1 (External Secrets Operator + AWS Secrets Manager) [RECOMMENDED for EKS]:
#   Install ESO → create an ExternalSecret CR that references AWS Secrets Manager.
#   ESO reconciles the ExternalSecret into a native Kubernetes Secret automatically.
#   The k8s Secret is never stored in Git — it lives only in the cluster.
#   See: https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# Option 2 (Sealed Secrets — Bitnami):
#   kubeseal encrypts the Secret with the cluster's public key.
#   The sealed (encrypted) YAML is safe to commit to Git.
#   Only the cluster's private key can decrypt it — not readable by humans.
#   See: https://github.com/bitnami-labs/sealed-secrets
#
# Option 3 (SOPS + age/KMS):
#   sops --encrypt secret.yaml → commits encrypted YAML to Git.
#   CI/CD decrypts at deploy time using a KMS key.
#   See: https://github.com/mozilla/sops
#
# Option 4 (kubectl create secret — imperative, for local dev):
#   kubectl create secret generic bankapp-secret \
#     --from-literal=MYSQL_ROOT_PASSWORD='your-root-pass' \
#     --from-literal=MYSQL_USER='your-user' \
#     --from-literal=MYSQL_PASSWORD='your-pass' \
#     --from-literal=SPRING_DATASOURCE_USERNAME='your-user' \
#     --from-literal=SPRING_DATASOURCE_PASSWORD='your-pass' \
#     --namespace=bankapp \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# SOURCE MAPPING (.env.example → Secret):
# ─────────────────────────────────────────
#   MYSQL_ROOT_PASSWORD        → data.MYSQL_ROOT_PASSWORD
#   MYSQL_USER                 → data.MYSQL_USER
#   MYSQL_PASSWORD             → data.MYSQL_PASSWORD
#   SPRING_DATASOURCE_USERNAME → data.SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD → data.SPRING_DATASOURCE_PASSWORD
#
# NOTE: SPRING_DATASOURCE_USERNAME == MYSQL_USER (same value, two env var names).
#       Kubernetes injects them as separate env vars because Spring Boot and MySQL
#       containers read different variable names. Storing the value once and
#       referencing the same Secret key for both is preferred (see Deployments).
# =============================================================================

apiVersion: v1
kind: Secret

metadata:
  # ── Identity ────────────────────────────────────────────────────────────────
  name:      bankapp-secret
  namespace: bankapp

  labels:
    app.kubernetes.io/name:       bankapp
    app.kubernetes.io/component:  secret
    app.kubernetes.io/part-of:    java-monolith
    app.kubernetes.io/managed-by: kustomize

  annotations:
    # Document the intended injection mechanism for cluster operators.
    # Replace this annotation value with the actual ESO ExternalSecret name
    # once External Secrets Operator is deployed on the cluster.
    secret-management/strategy: "template-only | replace-with: ESO or SealedSecrets in production"
    secret-management/source:   "populate from: AWS Secrets Manager | Azure Key Vault | HashiCorp Vault"

# Opaque: the generic Secret type. Kubernetes does not interpret the data keys —
# they are treated as arbitrary byte arrays. Use specific types (kubernetes.io/tls,
# kubernetes.io/dockerconfigjson) only when a Kubernetes component reads them directly.
type: Opaque

# IMPORTANT: All values in data: must be base64-encoded.
# Values below are PLACEHOLDERS. Replace with real base64-encoded credentials.
# Format: echo -n "real-value" | base64
data:
  # MySQL root password — used by MySQL container's MYSQL_ROOT_PASSWORD env var.
  # Root password should NEVER be shared with the application. The app uses
  # MYSQL_USER / MYSQL_PASSWORD (a least-privilege user) instead.
  # Placeholder: "REPLACE_ROOT_PASSWORD"
  MYSQL_ROOT_PASSWORD: UkVQTEFDRV9ST09UX1BBU1NXT1JE

  # MySQL application user — least-privilege account for the Spring Boot app.
  # MySQL creates this user on container init using MYSQL_USER + MYSQL_PASSWORD.
  # Placeholder: "REPLACE_DB_USER"
  MYSQL_USER: UkVQTEFDRV9EQl9VU0VS

  # MySQL application password — paired with MYSQL_USER above.
  # Placeholder: "REPLACE_DB_PASSWORD"
  MYSQL_PASSWORD: UkVQTEFDRV9EQl9QQVNTV09SRA==

  # Spring Boot datasource username — must equal MYSQL_USER value.
  # Kept as a separate key because Spring Boot reads SPRING_DATASOURCE_USERNAME
  # while MySQL reads MYSQL_USER — two different env var names, same value.
  # Placeholder: "REPLACE_DB_USER"
  SPRING_DATASOURCE_USERNAME: UkVQTEFDRV9EQl9VU0VS

  # Spring Boot datasource password — must equal MYSQL_PASSWORD value.
  # Same rationale as SPRING_DATASOURCE_USERNAME above.
  # Placeholder: "REPLACE_DB_PASSWORD"
  SPRING_DATASOURCE_PASSWORD: UkVQTEFDRV9EQl9QQVNTV09SRA==
  
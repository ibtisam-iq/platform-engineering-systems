services:
  web:
    build:
      context: ..                   # java-monolith/ — one level up from docker/
      dockerfile: docker/Dockerfile # relative to the context above
    image: java-monolith-bankapp
    container_name: bank-web
    restart: unless-stopped
    ports:
      - "8000:8000"

    env_file:
      - .env                        # java-monolith/docker/.env (relative to this compose file)

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app-network

    healthcheck:
      # Note: curl (not on Alpine)
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  db:
    image: mysql:8
    container_name: mysql-db
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - app-network

    healthcheck:
      # Note: "-h db" (wrong — that's the service name, not valid inside the container)
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
